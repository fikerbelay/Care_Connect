<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareConnect - Hospital Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <h1> CareConnect Admin</h1>
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="admin.html" class="active">Admin</a>
                <a href="#" id="logoutBtn">Logout</a>
            </nav>
        </div>
    </header>

    <section class="admin-section">
        <div class="container">
            <h2>Hospital Dashboard</h2>
            <p>Manage your hospital information and appointments.</p>

            <div class="admin-grid">
              
                <div class="admin-card">
                    <h3>➕ Add New Hospital</h3>
                    <form id="addHospitalForm">
                        <div class="form-group">
                            <input type="text" id="hospitalName" placeholder="Hospital Name" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="hospitalLocation" placeholder="Location" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="hospitalSpecialty" placeholder="Specialty" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="hospitalServices" placeholder="Services (comma separated)">
                        </div>
                        <div class="form-group">
                            <input type="text" id="hospitalPrice" placeholder="Price Range (e.g., 500-2000 ETB)">
                        </div>
                        <div class="form-group">
                            <input type="text" id="hospitalPhone" placeholder="Contact Phone">
                        </div>
                        <button type="submit" class="btn-primary">Add Hospital</button>
                    </form>
                </div>

          
                <div class="admin-card">
                    <h3>📋 Your Hospitals</h3>
                    <div id="hospitalList"></div>
                </div>
              
                <div class="admin-card">
                    <h3> Pending Appointments</h3>
                    <div id="appointmentList"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
